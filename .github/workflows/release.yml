name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel layout
        run: |
          python -m zipfile -l dist/*.whl | tee /dev/stderr | \
            grep -q "plugins/memory/sonzai/provider.py"
          python -m zipfile -l dist/*.whl | grep -q "plugins/context_engine/sonzai/engine.py"
          python -m zipfile -l dist/*.whl | grep -q "sonzai_common/__init__.py"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
